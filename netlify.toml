# Netlify configuration — castorene.cl
[build]
  publish = "."

# Force the canonical host to www.castorene.cl (redirect apex -> www)
[[redirects]]
  from = "https://castorene.cl/*"
  to = "https://www.castorene.cl/:splat"
  status = 301
  force = true

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
